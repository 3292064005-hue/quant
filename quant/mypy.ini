[mypy]
python_version = 3.10
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
strict_optional = True
check_untyped_defs = True
no_implicit_optional = True
exclude = (^runtime/)|(^sample_data/)

[mypy-yaml]
ignore_missing_imports = True

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-tushare]
ignore_missing_imports = True

[mypy-akshare]
ignore_missing_imports = True

[mypy-a_share_quant.adapters.*]
ignore_errors = True

[mypy-a_share_quant.ui.*]
ignore_errors = True

[mypy-setuptools]
ignore_missing_imports = True
