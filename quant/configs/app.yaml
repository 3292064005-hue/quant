app:
  name: AShareQuantWorkstation
  environment: local
  timezone: Asia/Shanghai
  logs_dir: ../runtime/logs
  path_resolution_mode: config_dir
  runtime_mode: research_backtest
data:
  storage_dir: ../runtime/data
  reports_dir: ../runtime/reports
  default_exchange: SSE
  default_csv_encoding: utf-8
  provider: csv
  adj_type: ''
  tushare_token: null
  tushare_token_env: TUSHARE_TOKEN
  max_symbols_per_run: null
  request_timeout_seconds: 15.0
  allow_degraded_data: true
  fail_on_degraded_data: false
database:
  path: ../runtime/a_share_quant.db
backtest:
  initial_cash: 1000000.0
  fee_bps: 3.0
  tax_bps: 10.0
  slippage_bps: 5.0
  benchmark_symbol: 000300.SH
  rebalance_mode: close
  data_access_mode: preload
  valuation:
    missing_price_policy: last_known
risk:
  max_position_weight: 0.6
  max_order_value: 600000.0
  blocked_symbols: []
  kill_switch: false
strategy:
  strategy_id: momentum_top_n
  class_path: null
  version: 1.0.0
  params: {}
  lookback: 5
  top_n: 2
  holding_days: 3
broker:
  provider: mock
  operation_timeout_seconds: 15.0
  strict_contract_mapping: true
  client_factory: null
