app:
  name: AShareQuantWorkstation
  environment: local
  timezone: Asia/Shanghai
  logs_dir: ../runtime/logs
  path_resolution_mode: config_dir
  runtime_mode: research_backtest
  distribution_profile: workstation
data:
  storage_dir: ../runtime/data
  reports_dir: ../runtime/reports
  default_exchange: SSE
  default_csv_encoding: utf-8
  provider: csv
  adj_type: ''
  tushare_token: null
  tushare_token_env: TUSHARE_TOKEN
  max_symbols_per_run: null
  request_timeout_seconds: 15.0
  allow_degraded_data: true
  calendar_policy: demo
  fail_on_degraded_data: false
database:
  path: ../runtime/a_share_quant.db
backtest:
  initial_cash: 1000000.0
  fee_bps: 3.0
  tax_bps: 10.0
  slippage_bps: 5.0
  benchmark_symbol: 600000.SH
  rebalance_mode: close
  data_access_mode: preload
  valuation:
    missing_price_policy: last_known
  execution:
    event_mode: bus
    fill_model: volume_share
    slippage_model: bps
    fee_model: broker_bps
    tax_model: a_share_sell_tax
    max_volume_share: 1.0
    allow_partial_fill: true
    min_trade_lot: 100
risk:
  max_position_weight: 0.6
  max_order_value: 600000.0
  blocked_symbols: []
  kill_switch: false
strategy:
  strategy_id: momentum_top_n
  class_path: null
  version: 1.0.0
  params: {}
  lookback: 5
  top_n: 2
  holding_days: 3
  research_signal_run_id: null
broker:
  provider: mock
  operation_timeout_seconds: 15.0
  strict_contract_mapping: true
  client_factory: null
  event_source_mode: auto
plugins:
  enabled_builtin: []
  disabled: []
  external: []
operator:
  require_approval: false
  max_batch_orders: 20
  default_requested_by: operator
  fail_fast: false
  supervisor_scan_interval_seconds: 1.0
  supervisor_lease_seconds: 15.0
  supervisor_heartbeat_interval_seconds: 5.0
  supervisor_idle_timeout_seconds: 2.0
  supervisor_max_sessions_per_pass: 10
research:
  enable_cache: true
  cache_namespace: default
  cache_schema_version: v3
  dataset_scope_cache_invalidation: true
  max_cached_entries: 500
  record_query_runs: false
